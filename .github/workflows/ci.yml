name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run check
      - name: Typecheck
        run: bun run typecheck
      - name: Lint (type-aware)
        run: bun run lint
      - name: Tests
        run: bun run test
